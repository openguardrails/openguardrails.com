
server {
    listen 80;
    server_name openguardrails.com www.openguardrails.com api.openguardrails.com;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/ogrwww;    
    }

    # 在验证成功后再进行 HTTPS 重定向
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 80;
    server_name moltguard.com www.moltguard.com api.moltguard.com;

    location /.well-known/acme-challenge/ {
        root /var/www/ogrwww;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name moltguard.com www.moltguard.com;

    ssl_certificate /etc/letsencrypt/live/moltguard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moltguard.com/privkey.pem;

    root /var/www/moltguard-website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name api.moltguard.com;

    ssl_certificate /etc/letsencrypt/live/moltguard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moltguard.com/privkey.pem;

    client_max_body_size 10m;

    # MoltGuard Backend API (port 8000)
    location / {
        proxy_pass http://localhost:48000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 10;
    }
}

server {
    listen 443 ssl;
    server_name openguardrails.com www.openguardrails.com;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/openguardrails.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openguardrails.com/privkey.pem;

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;

    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 设置超时时间
    keepalive_timeout 14400s;
    client_body_timeout 14400s;
    client_header_timeout 14400s;
    send_timeout 14400s;
    proxy_connect_timeout 14400s;
    proxy_send_timeout 14400s;
    proxy_read_timeout 14400s;

    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # WebSocket tunnel
    location = /core/tunnel/ws {
        proxy_pass http://localhost:53666/tunnel/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
    }

    location = /core/tunnel/stats {
        proxy_pass http://localhost:53666/tunnel/stats;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTTP tunnel proxy
    location ^~ /core/tunnel/ {
        proxy_pass http://localhost:53666/tunnel/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
    }

    # Strip /core prefix so Core app receives /api/v1/... (plugin register & auth routes)
    location ^~ /core/ {
        proxy_pass http://localhost:53666/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /core {
        return 301 $scheme://$host/core/;
    }
    # Claim URLs (with or without /core) — proxy to Core app so GET/POST /claim/:token work
    location ^~ /claim/ {
        proxy_pass http://localhost:53666/claim-agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Portal: login + account (checkout, usage, etc.) — proxy to Core so no /core prefix needed in links
    location ^~ /account/ {
        proxy_pass http://localhost:53666/account/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /login {
        proxy_pass http://localhost:53666/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /dashboard/api {
        proxy_pass http://localhost:53667/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Dashboard SPA: serve static assets first, then index.html for client routes
    location /dashboard/ {
        alias /var/www/ogdashboard/;
        # Prefer exact file, then index.html for SPA routes (no fallback for missing assets)
        try_files $uri $uri/ /dashboard/index.html;
    }
    location = /dashboard {
        return 301 $scheme://$host/dashboard/;
    }

    # 护栏管理API 代理 - 处理前端的相对路径API请求
    location ^~ /api/ {
        proxy_pass http://localhost:53333/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源处理 - 平台资源
    location ^~ /platform/assets/ {
        alias /var/www/ogrp/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 平台SPA应用
    location /platform/ {
        alias /var/www/ogrp/;
        try_files $uri $uri/ /platform/index.html;
    }

    # Landing page - 根路径
    location / {
        root /var/www/ogrwww/;
        try_files $uri $uri.html $uri/ /index.html;
    }

    #error_page  404              /404.html;
    # redirect server error pages to the static page /50x.html
    #
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root html;
    }
}

server {
    listen 443 ssl;
    server_name api.openguardrails.com;

    ssl_certificate /etc/letsencrypt/live/api.openguardrails.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.openguardrails.com/privkey.pem;

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;

    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 为api服务器设置文件大小限制
    client_max_body_size 128m;
    client_body_buffer_size 128m;

    # 设置超时时间
    keepalive_timeout 14400s;
    client_body_timeout 14400s;
    client_header_timeout 14400s;
    send_timeout 14400s;
    proxy_connect_timeout 14400s;
    proxy_send_timeout 14400s;
    proxy_read_timeout 14400s;

    # --- Platform console (added for CF Worker proxy: serve console SPA + management API on api host) ---

    # --- Core app + console routes (mirror of main vhost, for CF Worker proxy) ---
    location = /core/tunnel/ws {
        proxy_pass http://localhost:53666/tunnel/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
    }
    location = /core/tunnel/stats {
        proxy_pass http://localhost:53666/tunnel/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /core/tunnel/ {
        proxy_pass http://localhost:53666/tunnel/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 14400s;
        proxy_send_timeout 14400s;
    }
    location ^~ /core/ {
        proxy_pass http://localhost:53666/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /core {
        return 301 $scheme://$host/core/;
    }
    location ^~ /claim/ {
        proxy_pass http://localhost:53666/claim-agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /account/ {
        proxy_pass http://localhost:53666/account/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /login {
        proxy_pass http://localhost:53666/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /dashboard/api {
        proxy_pass http://localhost:53667/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dashboard/ {
        alias /var/www/ogdashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }
    location = /dashboard {
        return 301 $scheme://$host/dashboard/;
    }
    # --- end Core app + console routes ---
    location ^~ /platform/assets/ {
        alias /var/www/ogrp/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /platform/ {
        alias /var/www/ogrp/;
        try_files $uri $uri/ /platform/index.html;
    }
    location ^~ /api/ {
        proxy_pass http://localhost:53333/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    set $target '';
    # 检测API代理 - 高并发检测服务 (优先级最高)
    location ^~ /v1/guardrails {
        proxy_pass http://localhost:53334/v1/guardrails;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # 模型直接访问API代理 
    location ^~ /v1/model/ {
        proxy_pass http://localhost:53334;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # 模型直接访问API代理 
    location ^~ /v1/scan/ {
        proxy_pass http://localhost:53334;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # 检测API代理 - 高并发检测服务 (优先级最高)
    location ^~ /v1/dify/moderation {
        proxy_pass http://localhost:53334/v1/dify/moderation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Compatible with Dify gateway
    location ~ ^/v1/gateway/(?:v1/)?(.*)$ {
        proxy_pass http://127.0.0.1:53335/v1/$1;    
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    location ~ ^/v1/appeal/(.*)$  {
        proxy_pass http://127.0.0.1:53334/v1/appeal/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # 再放通用的 /v1/ 匹配
    # CORS is handled by the backend FastAPI services - do not add redundant headers here
    location /v1/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        default_type application/json;
    }

    location @proxy {
        proxy_pass $target;
        proxy_connect_timeout 600;
    }
}

